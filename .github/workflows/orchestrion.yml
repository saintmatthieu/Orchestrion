name: Orchestrion

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

# When pushing a commit and a tag pointing at it together (i.e. cutting a
# release), the branch and tag events would otherwise spawn two identical
# builds. Group by SHA so the second run cancels the first.
concurrency:
  group: orchestrion-${{ github.sha }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release
  BUILD_DIR: build
  # User-facing version used in artifact filenames. Tag-triggered runs use
  # the tag (e.g. v0.0.7); everything else gets a per-run dev marker.
  RELEASE_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('dev-{0}', github.run_number) }}

jobs:
  build_win:
    if: ${{ !contains(github.event.head_commit.message, '[skip win]') }}
    runs-on: windows-2022

    steps:
      - name: Install Git LFS
        run: choco install git-lfs -y

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Pull LFS files
        run: git lfs pull

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.9.1"
          host: "windows"
          target: "desktop"
          arch: "win64_msvc2022_64"
          modules: qtnetworkauth qt5compat qtscxml qtshadertools
          cache: true

      - name: Install Ninja
        run: choco install ninja -y

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup sccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          variant: sccache
          key: ${{ runner.os }}-sccache

      - name: Configure CMake
        run: >
          cmake -B ${{github.workspace}}/build -G Ninja
          -DCMAKE_C_COMPILER=cl
          -DCMAKE_CXX_COMPILER=cl
          -DCMAKE_C_COMPILER_LAUNCHER=sccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
          -DSMTG_ENABLE_VST3_HOSTING_EXAMPLES=OFF
          -DSMTG_ENABLE_VST3_PLUGIN_EXAMPLES=OFF
          -DSMTG_ENABLE_VSTGUI_SUPPORT=OFF

      - name: Build
        run: cmake --build ${{github.workspace}}/${{env.BUILD_DIR}} --config ${{env.BUILD_TYPE}} --target install

      - name: Add WiX to PATH
        shell: pwsh
        run: |
          # WiX 3 ships preinstalled on windows-latest runners.
          $wixBin = "$env:WIX\bin"
          if (-not (Test-Path $wixBin)) {
            $wixBin = (Get-ChildItem "C:\Program Files (x86)\WiX Toolset *" -Directory | Select-Object -First 1).FullName + "\bin"
          }
          Write-Host "WiX bin: $wixBin"
          "$wixBin" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH

      - name: Build MSI Installers
        working-directory: ${{github.workspace}}/${{env.BUILD_DIR}}
        shell: pwsh
        run: |
          $outDir = "${{github.workspace}}/${{env.BUILD_DIR}}/package"
          $wxlDir = "${{github.workspace}}/buildscripts/packaging/Windows/Installer"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          foreach ($lang in @('en-US','fr-FR','de-DE')) {
            $stage = "${{github.workspace}}/${{env.BUILD_DIR}}/package-$lang"
            # Override CPACK_WIX_LIGHT_EXTRA_FLAGS as well as CULTURES so the
            # -loc path matches the requested culture (the value baked into
            # CPackConfig.cmake at configure time is locked to en-US).
            cpack -G WIX -C $env:BUILD_TYPE -B $stage `
              -D "CPACK_WIX_CULTURES=$lang" `
              -D "CPACK_WIX_LIGHT_EXTRA_FLAGS=-loc;$wxlDir/strings_$lang.wxl"
            if ($LASTEXITCODE -ne 0) { throw "cpack failed for $lang" }
            $msi = Get-ChildItem "$stage/Orchestrion-*.msi" | Select-Object -First 1
            if (-not $msi) { throw "No MSI produced for $lang" }
            $target = Join-Path $outDir "Orchestrion-${env:RELEASE_VERSION}-Windows-$lang.msi"
            Move-Item -Force $msi.FullName $target
            Write-Host "Produced $target"
          }

      - name: Upload WiX logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: WiX logs
          path: "${{env.BUILD_DIR}}/package-*/_CPack_Packages/**/wix.log"
          if-no-files-found: ignore

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Orchestrion Windows
          path: "${{env.BUILD_DIR}}/package/Orchestrion-*.msi"

      - name: Upload Debug Symbols
        uses: actions/upload-artifact@v4
        with:
          name: Orchestrion Windows Symbols
          path: ${{env.BUILD_DIR}}\Orchestrion.pdb
        if: false # Set to true (and BUILD_TYPE to Debug) if you need to locally debug a github build

  build_mac:
    if: ${{ !contains(github.event.head_commit.message, '[skip mac]') }}
    runs-on: macos-latest

    steps:
      - name: Install libsndfile
        run: brew install libsndfile

      - name: Install Git LFS
        run: brew install git-lfs

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Pull LFS files
        run: git lfs pull

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.9.1"
          arch: "clang_64"
          target: "desktop"
          modules: qtnetworkauth qt5compat qtscxml qtshadertools
          cache: true

      - name: Install Ninja
        run: brew install ninja

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-ccache

      - name: Configure CMake
        run: >
          cmake -B ${{github.workspace}}/build -G Ninja
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
          -DSMTG_ENABLE_VST3_HOSTING_EXAMPLES=OFF
          -DSMTG_ENABLE_VST3_PLUGIN_EXAMPLES=OFF
          -DSMTG_ENABLE_VSTGUI_SUPPORT=OFF

      - name: Build
        run: cmake --build ${{github.workspace}}/${{env.BUILD_DIR}} --config ${{env.BUILD_TYPE}} --target install

      - name: Run macdeployqt
        run: macdeployqt ${{env.BUILD_DIR}}/Orchestrion.app -qmldir=${{github.workspace}}/src -qmldir=${{github.workspace}}/MuseScore/src

      - name: Codesign executable
        # https://localazy.com/blog/how-to-automatically-sign-macos-apps-using-github-actions
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          echo $MACOS_CERTIFICATE | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P $MACOS_CERTIFICATE_PWD -T /usr/bin/codesign
          security find-identity -v
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          find ${{env.BUILD_DIR}}/Orchestrion.app -type f \( -perm +111 -o -name "*.dylib" -o -name "*.so" -o -name "*.framework" -o -name "*.o" \) -exec codesign --timestamp --force --verify --verbose --strict --sign "Developer ID Application: Matthieu Hodgkinson (7JHUJWK5GF)" {} \;
          codesign --timestamp --deep --force --verify --verbose --strict --options runtime --sign "Developer ID Application: Matthieu Hodgkinson (7JHUJWK5GF)" ${{env.BUILD_DIR}}/Orchestrion.app

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: create-dmg --volname "Orchestrion" --window-pos 200 120 --window-size 800 400 --icon-size 100 --icon Orchestrion.app 200 190 --app-drop-link 600 185 "${{env.BUILD_DIR}}/Orchestrion-${{env.RELEASE_VERSION}}-macOS.dmg" ${{env.BUILD_DIR}}/Orchestrion.app

      - name: Notarize
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
        run: |
          xcrun notarytool submit "${{env.BUILD_DIR}}/Orchestrion-${{env.RELEASE_VERSION}}-macOS.dmg" --apple-id saintmatthieu@mailbox.org --team-id 7JHUJWK5GF --password ${{secrets.ORCHESTRION_SPECIFIC_PWD}} --wait
          xcrun stapler staple "${{env.BUILD_DIR}}/Orchestrion-${{env.RELEASE_VERSION}}-macOS.dmg"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Orchestrion Mac
          path: "${{env.BUILD_DIR}}/Orchestrion-${{env.RELEASE_VERSION}}-macOS.dmg"

  build_linux:
    if: ${{ !contains(github.event.head_commit.message, '[skip linux]') }}
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Install Git LFS
        run: sudo apt-get update && sudo apt-get install -y git-lfs

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Pull LFS files
        run: git lfs pull

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            libsndfile1-dev \
            libasound2-dev \
            libpulse-dev \
            libjack-dev \
            libgl1-mesa-dev \
            libxkbcommon-x11-dev \
            libxkbcommon-dev \
            libxcb-util-dev \
            libxcb-cursor-dev \
            libxcb-keysyms1-dev \
            libxcb-icccm4-dev \
            libxcb-image0-dev \
            libxcb-render-util0-dev \
            libxcb-xinerama0-dev \
            libxcb-xfixes0-dev \
            libxcb-shape0-dev \
            libxcb-xkb-dev \
            libgtkmm-3.0-dev \
            libsqlite3-dev \
            fuse \
            file

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.9.1"
          host: "linux"
          target: "desktop"
          arch: "linux_gcc_64"
          modules: qtnetworkauth qt5compat qtscxml qtshadertools
          cache: true

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-ccache

      - name: Configure CMake
        run: >
          cmake -B ${{github.workspace}}/${{env.BUILD_DIR}} -G Ninja
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
          -DSMTG_ENABLE_VST3_HOSTING_EXAMPLES=OFF
          -DSMTG_ENABLE_VST3_PLUGIN_EXAMPLES=OFF
          -DSMTG_ENABLE_VSTGUI_SUPPORT=OFF

      - name: Build
        run: cmake --build ${{github.workspace}}/${{env.BUILD_DIR}} --config ${{env.BUILD_TYPE}} --target install

      - name: Install linuxdeploy
        run: |
          wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage

      - name: Create AppImage
        run: |
          set -e
          export LD_LIBRARY_PATH=${{env.QT_ROOT_DIR}}/lib:$LD_LIBRARY_PATH
          export QML_SOURCES_PATHS=${{github.workspace}}/src:${{github.workspace}}/MuseScore/src

          # Pre-populate AppDir with the install tree data files (wallpapers, soundfonts, etc.)
          # linuxdeploy only bundles the executable and libraries, so we need to
          # place data files where the app expects them: <exe_dir>/../share/
          mkdir -p ${{env.BUILD_DIR}}/AppDir/usr
          cp -r ${{env.BUILD_DIR}}/install/share ${{env.BUILD_DIR}}/AppDir/usr/

          ./linuxdeploy-x86_64.AppImage \
            --appdir=${{env.BUILD_DIR}}/AppDir \
            --executable=${{env.BUILD_DIR}}/install/bin/Orchestrion \
            --desktop-file=${{github.workspace}}/share/orchestrion.desktop \
            --icon-file=${{github.workspace}}/icons/orchestrion.png \
            --plugin qt \
            --output appimage
          # Find and verify the created AppImage (should match Orchestrion-*-x86_64.AppImage or Orchestrion-x86_64.AppImage)
          APPIMAGE_FILE=$(find . -maxdepth 1 -name "Orchestrion*-x86_64.AppImage" -type f -print -quit)
          if [ -z "$APPIMAGE_FILE" ]; then
            echo "Error: AppImage was not created"
            ls -la *.AppImage 2>/dev/null || echo "No AppImage files found"
            exit 1
          fi
          echo "Found AppImage: $APPIMAGE_FILE"
          OUTPUT="${{env.BUILD_DIR}}/Orchestrion-${{env.RELEASE_VERSION}}-Linux-x86_64.AppImage"
          mv "$APPIMAGE_FILE" "$OUTPUT"
          echo "AppImage created successfully: $OUTPUT"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Orchestrion Linux
          path: "${{env.BUILD_DIR}}/Orchestrion-${{env.RELEASE_VERSION}}-Linux-x86_64.AppImage"

  release:
    needs: [build_win, build_mac, build_linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./artifacts/**
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
